      <a class="navbar-brand" href="#">KAMELIE</a>

  <!-- Login Form -->
  <div class="login-container">
    <div class="card p-4 shadow-lg rounded form-card">
      <h2 class="text-center mb-4 text-primary">Welcome Back</h2>
      <form id="login-form">
        <!-- Email -->
        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input type="email" id="email" name="email" class="form-control" placeholder="Enter your email" required>
        </div>
        <!-- Password -->
        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input type="password" id="password" name="password" class="form-control" placeholder="Enter your password" required>
        </div>
        <!-- Submit Button -->
        <button type="submit" class="btn btn-primary w-100">Login</button>
      </form>
      <!-- Sign-Up Link -->
      <div class="text-center mt-3">
        <p>Don't have an account? <a href="signup.html" class="text-primary">Sign Up</a></p>
      </div>
